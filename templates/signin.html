{% extends "base.html" %}
{% block title %}Sign In – ExpenseTracker{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-brand"><i data-lucide="wallet" class="icon-lg"></i></div>
        <h1>Welcome Back</h1>
        <h2>Sign in to your account</h2>
        <form method="POST" action="{{ url_for('signin') }}">
            <div class="form-group">
                <label><i data-lucide="user" class="icon-xs"></i> Username</label>
                <input type="text" name="username" required autofocus placeholder="Enter your username">
            </div>
            <div class="form-group">
                <label><i data-lucide="lock" class="icon-xs"></i> Password</label>
                <input type="password" name="password" required placeholder="Enter your password">
            </div>
            <button type="submit" class="btn btn-primary btn-full"><i data-lucide="log-in" class="icon-sm"></i> Sign In</button>
        </form>
        <p class="auth-link">Don't have an account? <a href="{{ url_for('signup') }}">Sign Up</a></p>
        <p class="auth-link"><a href="{{ url_for('forgot_password') }}"><i data-lucide="key" class="icon-xs"></i> Forgot Password?</a></p>
    </div>
</div>
{% endblock %}
