{% extends "base.html" %}
{% block title %}Change Password — ExpenseTracker{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <i data-lucide="lock" class="auth-icon"></i>
            <h1>Change Password</h1>
            <p>Update your account password</p>
        </div>
        <form method="POST" action="{{ url_for('change_password') }}">
            <div class="form-group">
                <label for="current_password">Current Password</label>
                <input type="password" id="current_password" name="current_password" required minlength="6" placeholder="Enter current password">
            </div>
            <div class="form-group">
                <label for="new_password">New Password</label>
                <input type="password" id="new_password" name="new_password" required minlength="6" placeholder="At least 6 characters">
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm New Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required minlength="6" placeholder="Repeat new password">
            </div>
            <button type="submit" class="btn btn-primary btn-full"><i data-lucide="check" class="icon-sm"></i> Update Password</button>
        </form>
        <div class="auth-footer">
            <a href="{{ url_for('dashboard') }}"><i data-lucide="arrow-left" class="icon-sm"></i> Back to Dashboard</a>
        </div>
    </div>
</div>
{% endblock %}
