{% extends "base.html" %}
{% block title %}Edit Income – ExpenseTracker{% endblock %}
{% block content %}
<div class="page-header"><h1><i data-lucide="edit" class="icon"></i> Edit Income</h1></div>
<div class="card form-card">
<form method="POST" action="{{ url_for('edit_income', income_id=income_item['id']) }}">
<div class="form-row">
    <div class="form-group"><label>Source</label>
        <select name="source" required>{% for s in income_sources %}<option value="{{ s }}" {% if income_item['source'] == s %}selected{% endif %}>{{ s }}</option>{% endfor %}</select>
    </div>
    <div class="form-group"><label>Amount (₹)</label>
        <input type="number" name="amount" step="0.01" min="0.01" required value="{{ income_item['amount'] }}">
    </div>
    <div class="form-group"><label>Date</label>
        <input type="date" name="income_date" required value="{{ income_item['income_date'] }}">
    </div>
    <div class="form-group"><label>Recurrence</label>
        <select name="recurrence">{% for r in recurrence_options %}<option value="{{ r }}" {% if income_item['recurrence'] == r %}selected{% endif %}>{{ r|capitalize }}</option>{% endfor %}</select>
    </div>
    <div class="form-group flex-grow"><label>Description</label>
        <input type="text" name="description" value="{{ income_item['description'] or '' }}" placeholder="Optional note">
    </div>
</div>
<div class="form-row" style="margin-top:.8rem; gap:.5rem;">
    <button type="submit" class="btn btn-primary"><i data-lucide="save" class="icon-sm"></i> Save Changes</button>
    <a href="{{ url_for('income') }}" class="btn btn-outline"><i data-lucide="x" class="icon-sm"></i> Cancel</a>
</div>
</form>
</div>
{% endblock %}
{% block scripts %}<script>lucide.createIcons();</script>{% endblock %}
